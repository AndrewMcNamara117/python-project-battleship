name: Deploy Iron Miles site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "ironmiles/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages (creates the Pages site if it doesn't exist)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ironmiles

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
