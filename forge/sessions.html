<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#080808">
<title>Sessions | The Forge — Iron Miles</title>
<meta name="description" content="Upcoming Iron Miles sessions in Limerick — run club, strength, swims and events. All levels welcome. RSVP: I'm Showing Up.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Iron Miles">
<meta property="og:title" content="Sessions | The Forge — Iron Miles">
<meta property="og:description" content="Upcoming Iron Miles sessions in Limerick — run club, strength, swims and events. All levels welcome. RSVP: I'm Showing Up.">
<meta property="og:image" content="https://ironmiles.ie/assets/images/iron-miles-preview.jpg">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 780 660'%3E%3Cpolygon points='9,17 131,130 131,628 9,628' fill='%23eeeeee'/%3E%3Cpolygon points='172,162 381,365 729,17 729,628 607,628 607,311 376,541 172,337' fill='%232dff8a'/%3E%3C/svg%3E">
<link rel="stylesheet" href="assets/css/forge.css">
<script defer src="assets/js/forge-ui.js"></script>
<style>
  .rsvp-overlay{position:fixed;inset:0;z-index:140;background:rgba(8,8,8,.82);
    backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
    display:none;align-items:center;justify-content:center;padding:20px}
  .rsvp-overlay.open{display:flex}
  .rsvp-box{background:var(--panel);border:1px solid var(--line-2);border-radius:4px;
    padding:28px;max-width:440px;width:100%;
    animation:successin .4s cubic-bezier(.2,.9,.25,1) both}
  .rsvp-box h3{margin-bottom:4px}
  .rsvp-box .sub{font-size:.9rem;margin-bottom:18px}
  @media(prefers-reduced-motion:reduce){.rsvp-box{animation:none}}
</style>
</head>
<body>
<noscript><p style="padding:16px 20px;background:#111312;color:#eeeeee;border-bottom:1px solid rgba(45,255,138,.4)">The Forge needs JavaScript. Enable it and reload.</p></noscript>

<main id="main">
  <section>
    <div class="wrap">
      <div class="section-head fx">
        <span class="eyebrow">Sessions</span>
        <h1 class="fx-line">Show <span class="green">up</span></h1>
        <p class="lead">Upcoming Iron Miles sessions in Limerick. You do not need to be fast. You just need to show up.</p>
      </div>
      <div class="grid-cards" data-sessions>
        <div class="loader"><div class="txt">Loading The Forge…</div><div class="ln"></div></div>
      </div>
    </div>
  </section>
</main>

<!-- RSVP details for guests (logged-in members RSVP with their profile) -->
<div class="rsvp-overlay" role="dialog" aria-modal="true" aria-labelledby="rsvpTitle">
  <form class="rsvp-box forge-form" id="rsvpForm" novalidate>
    <h3 id="rsvpTitle">I'm Showing Up</h3>
    <p class="sub" data-rsvp-session></p>
    <div class="field">
      <label for="rsvpName">Name</label>
      <input id="rsvpName" required>
      <span class="err">We need a name to look out for.</span>
    </div>
    <div class="field">
      <label for="rsvpEmail">Email</label>
      <input id="rsvpEmail" type="email" required>
      <span class="err">Enter a valid email.</span>
    </div>
    <div class="field">
      <label for="rsvpInsta">Instagram <span class="opt">(optional)</span></label>
      <input id="rsvpInsta" placeholder="@handle">
    </div>
    <button class="btn btn-green block" type="submit">I'm Showing Up</button>
    <button class="btn btn-ghost block" type="button" data-rsvp-cancel>Not this time</button>
  </form>
</div>

<script type="module">
  import {
    initForgePage, auth, db, collection, addDoc, getDocs, query, where,
    serverTimestamp, toast, withLoading, escapeHtml, getMemberProfile,
  } from "./assets/js/forge-core.js";

  const user = await initForgePage();

  /* Default sample session — shown until real sessions exist in Firestore.
     Create real ones from /admin. */
  const SAMPLE = [{
    id: "sample-first-run-club",
    title: "First Iron Miles Run Club",
    date: "Saturday",
    time: "10:00am",
    location: "University of Limerick — Living Bridge",
    type: "5k social run",
    distance: "5k",
    difficulty: "All levels welcome",
    description: "No ego. No pressure. Just show up and move together.",
    capacity: null,
  }];

  const box = document.querySelector("[data-sessions]");
  /* The sample only shows when the backend is unreachable (e.g. Firebase not
     configured yet). A successful-but-empty query gets an honest empty state —
     never a phantom event people might actually show up for. */
  let sessions;
  try {
    const snap = await getDocs(query(collection(db, "sessions"), where("isActive", "==", true)));
    // dates are freeform text ("Saturday 26 July"), so keep admin creation order
    sessions = snap.docs.map((d) => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
  } catch (err) {
    console.error("sessions load failed — showing sample", err);
    sessions = SAMPLE;
  }

  box.innerHTML = sessions.length ? sessions.map((s, i) => `
    <div class="card session-card fx fx-scale" data-tilt>
      <div class="meta">
        ${s.type ? `<span class="tag green">${escapeHtml(s.type)}</span>` : ""}
        ${s.difficulty ? `<span class="tag">${escapeHtml(s.difficulty)}</span>` : ""}
        ${s.distance ? `<span class="tag">${escapeHtml(s.distance)}</span>` : ""}
      </div>
      <h3>${escapeHtml(s.title)}</h3>
      <p class="when">${escapeHtml(s.date)} · ${escapeHtml(s.time)}</p>
      <p>${escapeHtml(s.location)}</p>
      ${s.description ? `<p>${escapeHtml(s.description)}</p>` : ""}
      ${s.capacity ? `<p class="small">Capacity: ${escapeHtml(s.capacity)}</p>` : ""}
      <button class="btn btn-green" data-rsvp="${i}">I'm Showing Up</button>
    </div>`).join("") : `
    <div class="card session-card fx">
      <h3>Nothing on the board right now</h3>
      <p>The next session is being planned. Join The Forge and you'll hear when it lands.</p>
      <a class="btn btn-green" href="join.html">Join The Forge</a>
    </div>`;
  window.forgeMotionRefresh?.(box.parentElement);

  /* signed-in members: mark the sessions they've already said yes to,
     so nobody double-RSVPs after a reload */
  if (user) {
    try {
      const mine = await getDocs(query(collection(db, "eventSignups"), where("uid", "==", user.uid)));
      const going = new Set(mine.docs.map((d) => d.data().eventId));
      box.querySelectorAll("[data-rsvp]").forEach((b) => {
        if (going.has(sessions[Number(b.dataset.rsvp)]?.id)) {
          b.textContent = "You're In";
          b.disabled = true;
        }
      });
    } catch { /* non-fatal — worst case a duplicate RSVP row for admin */ }
  }

  /* ---------- RSVP ---------- */
  const overlay = document.querySelector(".rsvp-overlay");
  const form = document.getElementById("rsvpForm");
  let pending = null;

  async function saveRsvp(s, name, email, instagram, uid) {
    await addDoc(collection(db, "eventSignups"), {
      eventId: s.id,
      eventTitle: s.title,
      ...(uid ? { uid } : {}),
      name, email, instagram: instagram || "",
      status: "going",
      createdAt: serverTimestamp(),
    });
    toast("You're in. See you out there.");
  }

  box.addEventListener("click", async (e) => {
    const btn = e.target.closest("[data-rsvp]");
    if (!btn) return;
    const s = sessions[Number(btn.dataset.rsvp)];
    const current = auth.currentUser;
    if (current) {
      // signed in: RSVP with profile details, no form.
      // (not withLoading — on success the button must STAY "You're In")
      const orig = btn.textContent;
      btn.disabled = true;
      btn.textContent = "Forging…";
      try {
        const profile = await getMemberProfile(current.uid);
        await saveRsvp(s,
          profile?.fullName || current.displayName || current.email,
          profile?.email || current.email,
          profile?.instagram || "",
          current.uid);
        btn.textContent = "You're In";
      } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.textContent = orig;
        toast("That didn't save. Go again.", true);
      }
    } else {
      pending = { session: s, btn };
      overlay.querySelector("[data-rsvp-session]").textContent = `${s.title} — ${s.date}, ${s.time}`;
      overlay.classList.add("open");
      document.getElementById("rsvpName").focus();
    }
  });

  overlay.querySelector("[data-rsvp-cancel]").addEventListener("click", () => {
    overlay.classList.remove("open");
    pending = null;
  });
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) { overlay.classList.remove("open"); pending = null; }
  });
  addEventListener("keydown", (e) => {
    if (e.key === "Escape" && overlay.classList.contains("open")) {
      overlay.classList.remove("open");
      pending?.btn?.focus();
      pending = null;
    }
  });

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    if (!pending) return;
    let bad = false;
    [form.querySelector("#rsvpName"), form.querySelector("#rsvpEmail")].forEach((el) => {
      const ok = el.checkValidity();
      el.closest(".field").classList.toggle("error", !ok);
      if (!ok) bad = true;
    });
    if (bad) return;
    withLoading(e.submitter, async () => {
      try {
        await saveRsvp(pending.session,
          form.querySelector("#rsvpName").value.trim(),
          form.querySelector("#rsvpEmail").value.trim().toLowerCase(),
          form.querySelector("#rsvpInsta").value.trim(),
          null);
        pending.btn.textContent = "You're In";
        pending.btn.disabled = true;
        overlay.classList.remove("open");
        form.reset();
        pending = null;
      } catch (err) {
        console.error(err);
        toast("That didn't save. Go again.", true);
      }
    });
  });
</script>

</body>
</html>
