<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#080808">
<meta name="robots" content="noindex">
<title>Log In | The Forge — Iron Miles</title>
<meta name="description" content="Log in to The Forge — the Iron Miles member hub.">
<link rel="preconnect" href="https://www.gstatic.com" crossorigin>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 780 660'%3E%3Cpolygon points='9,17 131,130 131,628 9,628' fill='%23eeeeee'/%3E%3Cpolygon points='172,162 381,365 729,17 729,628 607,628 607,311 376,541 172,337' fill='%232dff8a'/%3E%3C/svg%3E">
<link rel="stylesheet" href="assets/css/forge.css">
<script defer src="assets/js/forge-ui.js"></script>
</head>
<body>
<noscript><p style="padding:16px 20px;background:#111312;color:#eeeeee;border-bottom:1px solid rgba(45,255,138,.4)">The Forge needs JavaScript. Enable it and reload.</p></noscript>

<main id="main">
  <section>
    <div class="wrap" style="max-width:460px">
      <div class="section-head fx">
        <span class="eyebrow">Log in</span>
        <h1 class="fx-line">Back to <span class="green">work</span></h1>
        <p class="lead">Made for the ones who keep going.</p>
      </div>
      <form class="forge-form panel fx" id="loginForm" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email" required>
          <span class="err">Enter a valid email.</span>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" autocomplete="current-password" required>
          <span class="err">Enter your password.</span>
        </div>
        <button class="btn btn-green block" type="submit">Log In</button>
        <p class="small">No account yet? <a class="green" href="register.html">Register</a> — it takes a minute.</p>
        <p class="small"><a class="green" href="#" id="forgot">Forgot your password?</a></p>
      </form>
    </div>
  </section>
</main>

<script type="module">
  import {
    initForgePage, auth, signInWithEmailAndPassword, sendPasswordResetEmail,
    toast, withLoading,
  } from "./assets/js/forge-core.js";

  const user = await initForgePage();
  // only allow same-site page names — never redirect off-site
  const raw = new URLSearchParams(location.search).get("next") || "";
  const next = /^[a-z-]+\.html$/.test(raw) ? raw : "dashboard.html";
  if (user) location.replace(next);

  const form = document.getElementById("loginForm");
  form.addEventListener("submit", (e) => {
    e.preventDefault();
    let bad = false;
    form.querySelectorAll("input[required]").forEach((el) => {
      const ok = el.checkValidity();
      el.closest(".field").classList.toggle("error", !ok);
      if (!ok) bad = true;
    });
    if (bad) return;
    withLoading(e.submitter, async () => {
      try {
        await signInWithEmailAndPassword(auth,
          form.querySelector("#email").value.trim(),
          form.querySelector("#password").value);
        location.href = next;
      } catch (err) {
        console.error(err.code);
        toast(err.code === "auth/invalid-credential"
          ? "Wrong email or password. Go again."
          : "Couldn't log you in. Check your connection and go again.", true);
      }
    }, "One more moment…");
  });

  document.getElementById("forgot").addEventListener("click", async (e) => {
    e.preventDefault();
    const email = form.querySelector("#email").value.trim();
    if (!email) { toast("Type your email above first, then tap that again.", true); return; }
    try {
      await sendPasswordResetEmail(auth, email);
      toast("Reset link sent. Check your inbox.");
    } catch {
      // don't reveal whether the account exists
      toast("If that account exists, a reset link is on its way.");
    }
  });
</script>

</body>
</html>
